<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Password | AI Slide Teacher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;700&display=swap');

    :root {
      --bg-0: #070b1d;
      --bg-1: #0a1330;
      --panel: rgba(10, 20, 52, 0.6);
      --line: rgba(84, 216, 255, 0.35);
      --text: #dff7ff;
      --muted: #8cb8d6;
      --cyan: #54d8ff;
      --teal: #35ffd3;
      --danger: #ff6e8a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
      background:
        radial-gradient(80rem 40rem at 20% 15%, #123d86 0%, transparent 45%),
        radial-gradient(70rem 30rem at 85% 80%, #0f5b64 0%, transparent 50%),
        linear-gradient(145deg, var(--bg-0) 0%, var(--bg-1) 100%);
      overflow: hidden;
      position: relative;
      padding: 24px;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(84, 216, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(84, 216, 255, 0.06) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 95%);
      pointer-events: none;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.55;
      pointer-events: none;
    }

    .orb.one {
      width: 220px;
      height: 220px;
      top: 6%;
      left: 7%;
      background: #2be9ff;
      animation: floatA 8s ease-in-out infinite;
    }

    .orb.two {
      width: 180px;
      height: 180px;
      right: 7%;
      bottom: 8%;
      background: #38ffbe;
      animation: floatB 9s ease-in-out infinite;
    }

    @keyframes floatA {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }

    @keyframes floatB {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(18px); }
    }

    .card {
      position: relative;
      width: min(460px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 34px 28px;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 0 1px rgba(84, 216, 255, 0.1) inset, 0 25px 55px rgba(3, 10, 28, 0.7);
      z-index: 2;
      animation: riseIn 650ms ease-out;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(16px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(84, 216, 255, 0.38);
      border-radius: 999px;
      padding: 5px 12px;
      color: var(--cyan);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.15rem, 2.9vw, 1.52rem);
      letter-spacing: 0.04em;
      margin-bottom: 9px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
      font-size: 1.02rem;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.95rem;
      color: #a8d6f0;
    }

    input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(84, 216, 255, 0.25);
      background: rgba(1, 18, 43, 0.45);
      color: #e9fbff;
      padding: 12px 12px;
      font-size: 1.03rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(84, 216, 255, 0.18);
      transform: translateY(-1px);
    }

    input::placeholder {
      color: rgba(191, 230, 255, 0.48);
    }

    .error {
      display: none;
      margin-top: 3px;
      margin-bottom: 12px;
      color: var(--danger);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .error.show {
      display: block;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      padding: 13px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #03132b;
      background: linear-gradient(95deg, var(--cyan) 0%, var(--teal) 100%);
      transition: transform 0.12s ease, filter 0.2s ease, opacity 0.2s ease;
      box-shadow: 0 8px 25px rgba(53, 255, 211, 0.35);
    }

    button:hover:not(:disabled) {
      filter: brightness(1.06);
    }

    button:active:not(:disabled) {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .loading-message-container {
      position: fixed;
      z-index: 3;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: min(460px, calc(100% - 32px));
      padding: 12px 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(56, 255, 190, 0.45);
      background: rgba(4, 41, 40, 0.95);
      color: #8fffe4;
      text-align: center;
      transition: top 550ms ease;
    }

    #loading-message {
      position: relative;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      padding-bottom: 10px;
    }

    .loading-message-container span.loader {
      width: 100%;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, #8fffe4, #54d8ff);
      position: absolute;
      left: 0;
      bottom: 0;
      transition: width 4s linear;
    }

    .loading-message-container.activated {
      top: 12px;
    }

    .loading-message-container.activated span.loader {
      width: 0;
    }
  </style>
</head>
<body>
  <div class="orb one"></div>
  <div class="orb two"></div>

  <div class="card">
    <div class="badge">Secure Activation</div>
    <h1>Set Administrator Password</h1>
    <div class="subtitle">Create a strong password to activate your account portal.</div>

    <form id="passwordForm" autocomplete="off">
      {% csrf_token %}
      <div class="form-group">
        <label for="password">Password</label>
        <input name="pass-1" type="password" id="password" placeholder="Minimum 8 characters" autocomplete="new-password" autocorrect="off" autocapitalize="none" spellcheck="false" list="">
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input name="pass-2" type="password" id="confirmPassword" placeholder="Re-enter password" autocomplete="new-password" autocorrect="off" autocapitalize="none" spellcheck="false" list="">
      </div>

      <div class="error" id="errorMessage">Please complete both fields and ensure passwords match.</div>
      <button type="submit" id="submitBtn" disabled>Activate Account</button>
    </form>
  </div>

  <div class="loading-message-container">
    <div id="loading-message">
      Activating Account...
      <span class="loader"></span>
    </div>
  </div>
  <script src='{% static "js/my_main.js" %}'></script>

  <script>
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const errorMessage = document.getElementById('errorMessage');
    const form = document.getElementById('passwordForm');
    const loadingContainer = document.querySelector('.loading-message-container');

    function validateForm() {
      const passwordVal = password.value;
      const confirmVal = confirmPassword.value;

      const isValidLength = passwordVal.length >= 8;
      const passwordsMatch = passwordVal === confirmVal && passwordVal !== '';
      const isValid = isValidLength && passwordsMatch;

      submitBtn.disabled = !isValid;
      if (isValid) {
        errorMessage.classList.remove('show');
      }
    }

    password.addEventListener('input', validateForm);
    confirmPassword.addEventListener('input', validateForm);

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      if (submitBtn.disabled) {
        errorMessage.classList.add('show');
        return;
      }

      submitBtn.textContent = 'Activating...';
      submitBtn.disabled = true;
      errorMessage.classList.remove('show');

      try {
        const pathParts = location.pathname.split('/').filter(Boolean);
        const memberId = pathParts[pathParts.length - 2];
        const emailId = pathParts[pathParts.length - 1];

        console.log(pathParts)
        const url = `/auth-api/set-password/${memberId}/${emailId}`;
        const formData = new FormData(form);

        const resJson = await create_model_instance(url, formData, false);

        if (resJson.success) {
          submitBtn.textContent = 'Activated';
          loadingContainer.classList.add('activated');
          setTimeout(() => {
            location.href = '/app/chat-box';
          }, 4000);
          return;
        }

        throw new Error(resJson.message || 'Could not activate account.');
      } catch (err) {
        errorMessage.textContent = err.message || 'Something went wrong. Try again.';
        errorMessage.classList.add('show');
        submitBtn.textContent = 'Activate Account';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
